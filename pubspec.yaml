name: blossom_upload_queue_shim_for_ndk
description: >-
  Offline-first wrapper around the ndk package's Blossom upload use case.
  Persists per-upload metadata to a sembast queue, reads blob bytes from a
  blossom_cache, and retries until every targeted server has acknowledged
  delivery.
version: 0.2.0
repository: https://github.com/nogringo/blossom-upload-queue-shim-for-ndk
issue_tracker: https://github.com/nogringo/blossom-upload-queue-shim-for-ndk/issues

topics:
  - nostr
  - ndk
  - blossom
  - offline-first
  - queue

environment:
  sdk: ^3.11.5

dependencies:
  blossom_cache: ^0.1.0
  ndk: ^0.8.4-dev.1
  sembast: ^3.8.7

dev_dependencies:
  idb_shim: ^2.9.2
  lints: ^6.0.0
  test: ^1.25.6
